name: Litecoin Core JSON-RPC FinOps
description: Cost model for operating and consuming the Litecoin Core JSON-RPC API.
  Since this is open-source self-hosted software, all costs are infrastructure costs
  borne by the node operator. There are no per-call API fees.
costs:
  - name: Infrastructure - Storage
    description: Litecoin Core requires approximately 22 GB of disk space for the
      full blockchain as of 2026. An SSD is recommended for performance.
    type: infrastructure
    unit: storage
    amount: 22
    currency: GB
    notes: Grows over time as the chain extends.
  - name: Infrastructure - Bandwidth
    description: Running a full node with default settings shares blocks and transactions
      with peers, consuming outbound bandwidth. Operators can limit peers with maxconnections.
    type: infrastructure
    unit: bandwidth
    notes: Typically a few hundred GB per month for a well-connected node.
  - name: Infrastructure - Compute
    description: Litecoin Core initial block download (IBD) is CPU and I/O intensive.
      Ongoing operation requires modest CPU for transaction validation and RPC serving.
    type: infrastructure
    unit: compute
    notes: A Raspberry Pi 4 or low-end VPS is sufficient for a pruned or archival node.
  - name: Network Transaction Fees
    description: Broadcasting transactions via sendrawtransaction incurs Litecoin
      network fees paid in LTC to miners. Average fee is 0.00003-0.0003 LTC per
      transaction (approximately $0.003-$0.03 USD at June 2026 prices of ~$43/LTC).
    type: network-fee
    unit: LTC per transaction
    amountMin: 0.00003
    amountMax: 0.0003
    currency: LTC

name: Litecoin Core JSON-RPC Rate Limits
description: The Litecoin Core JSON-RPC API is self-hosted. There are no platform-imposed
  rate limits. Practical limits are determined by the hardware resources of the node
  operator (CPU, I/O, available file descriptors). Litecoin Core documentation notes
  that too many simultaneous HTTP connections can cause crashes due to file descriptor
  exhaustion; operators should configure connection pools appropriately.
rateLimits:
  - name: No Published Limit
    description: No hard rate limit is enforced by the software. Throughput is bounded
      by node hardware, OS file descriptor limits, and network bandwidth.
    type: node-resource
    limit: null
    window: null
notes:
  - Running with high concurrency can exhaust file descriptors; use a connection pool
    and avoid opening excessive simultaneous connections.
  - For public-facing JSON-RPC exposure, restrict access via rpcallowip and firewall
    rules to prevent abuse.
